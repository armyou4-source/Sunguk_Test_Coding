<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <meta name="google-adsense-account" content="ca-pub-9237880355526261">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-9237880355526261" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="theme-toggle">
        <button id="theme-btn">Switch to Dark Mode</button>
    </div>
    <div class="container">
        <h1>미영아 행운이 가득하길 빌어~</h1>
        <p class="sub-heading">다른 준비도 하나씩 착착! 화이팅!</p>
        <div id="lotto-sets-container">
            <!-- Lotto sets will be generated here -->
        </div>
        <button id="generate-btn">미영이를 위한 행운의 번호</button>

        <div class="feedback-section">
            <hr>
            <h3>의견 남기기</h3>
            <form action="https://formspree.io/f/mzdoydwa" method="POST" id="feedback-form">
                <div class="form-group">
                    <label for="email">이메일 (답변을 원하시면 적어주세요)</label>
                    <input type="email" id="email" name="email" placeholder="example@email.com">
                </div>
                <div class="form-group">
                    <label for="message">의견</label>
                    <textarea id="message" name="message" required placeholder="응원의 한마디나 개선 의견을 남겨주세요!"></textarea>
                </div>
                <button type="submit" id="submit-btn">보내기</button>
            </form>
        </div>

        <div id="disqus_section" style="margin-top: 40px;">
            <hr>
            <div id="disqus_thread"></div>
            <script>
                var disqus_config = function () {
                    this.page.url = window.location.href;  
                    this.page.identifier = window.location.pathname; 
                };
                (function() { 
                    var d = document, s = d.createElement('script');
                    s.src = 'https://sunguk-test-coding.disqus.com/embed.js';
                    s.setAttribute('data-timestamp', +new Date());
                    (d.head || d.body).appendChild(s);
                })();
            </script>
            <noscript>Please enable JavaScript to view the <a href="https://disqus.com/?ref_noscript">comments powered by Disqus.</a></noscript>
        </div>
    </div>

    <script>
        (function() {
            function init() {
                var generateBtn = document.getElementById('generate-btn');
                var lottoSetsContainer = document.getElementById('lotto-sets-container');
                var themeBtn = document.getElementById('theme-btn');
                var body = document.body;

                function showError(msg) {
                    var errorDiv = document.createElement('div');
                    errorDiv.style.color = 'red';
                    errorDiv.style.marginTop = '10px';
                    errorDiv.textContent = 'Error: ' + msg;
                    document.body.appendChild(errorDiv);
                }

                try {
                    var savedTheme = null;
                    try {
                        savedTheme = localStorage.getItem('theme');
                    } catch (e) {
                        console.warn('localStorage access denied');
                    }

                    if (savedTheme === 'dark') {
                        body.classList.add('dark-mode');
                        if (themeBtn) themeBtn.textContent = 'Switch to Light Mode';
                    }

                    if (themeBtn) {
                        themeBtn.addEventListener('click', function() {
                            body.classList.toggle('dark-mode');
                            var isDark = body.classList.contains('dark-mode');
                            themeBtn.textContent = isDark ? 'Switch to Light Mode' : 'Switch to Dark Mode';
                            try {
                                localStorage.setItem('theme', isDark ? 'dark' : 'light');
                            } catch (e) {}
                        });
                    }

                    function generateLottoSet() {
                        var numbers = [];
                        while (numbers.length < 6) {
                            var num = Math.floor(Math.random() * 45) + 1;
                            if (numbers.indexOf(num) === -1) {
                                numbers.push(num);
                            }
                        }
                        return numbers.sort(function(a, b) { return a - b; });
                    }

                    function getColorClass(num) {
                        if (num <= 10) return 'range-1';
                        if (num <= 20) return 'range-11';
                        if (num <= 30) return 'range-21';
                        if (num <= 40) return 'range-31';
                        return 'range-41';
                    }

                    function displayLottoSets() {
                        if (!lottoSetsContainer) return;
                        lottoSetsContainer.innerHTML = '';
                        for (var i = 0; i < 5; i++) {
                            var set = generateLottoSet();
                            var setDiv = document.createElement('div');
                            setDiv.className = 'lotto-numbers';
                            
                            for (var j = 0; j < set.length; j++) {
                                var span = document.createElement('span');
                                span.className = 'number ' + getColorClass(set[j]);
                                span.textContent = set[j];
                                setDiv.appendChild(span);
                            }
                            
                            lottoSetsContainer.appendChild(setDiv);
                        }
                    }

                    if (generateBtn) {
                        generateBtn.addEventListener('click', displayLottoSets);
                    }

                    displayLottoSets();
                    console.log('Lotto generator initialized');

                } catch (err) {
                    console.error('Init error:', err);
                    showError(err.message);
                }
            }

            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', init);
            } else {
                init();
            }
        })();
    </script>
</body>
</html>
